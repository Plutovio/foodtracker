{% extends 'tracker/base.html' %}

{% block title %}Login - PG Food Tracker{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card login-card">
        <div style="text-align: center; margin-bottom: 24px;">
            <h1 style="font-size: 1.75rem; margin-bottom: 4px;">Welcome Back</h1>
            <p style="font-size: 0.875rem; color: var(--text-secondary);">Log in to track your food logs and payments</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger">
                Your username and password didn't match. Please try again.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" autofocus required id="id_username" class="form-control" placeholder="Enter username">
            </div>
            
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" required id="id_password" class="form-control" placeholder="••••••••">
            </div>

            <button type="submit" class="btn">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
