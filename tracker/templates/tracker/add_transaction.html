{% extends 'tracker/base.html' %}

{% block title %}Add Transaction - PG Food Tracker{% endblock %}

{% block content %}
<header style="margin-bottom: 20px;">
    <h1>Add Transaction</h1>
    <p style="font-size: 0.875rem; color: var(--text-secondary);">Log extra charges or payments made to the PG</p>
</header>

<div class="card" style="padding: 12px 20px 24px 20px;">
    <!-- Tab Navigation -->
    <div class="tab-nav">
        <div id="tab-extra" class="tab-item active" onclick="switchTab('extra')">Log Extra</div>
        <div id="tab-payment" class="tab-item" onclick="switchTab('payment')">Log Payment</div>
    </div>

    <!-- Log Extra Form -->
    <form id="form-extra" method="post" action="{% url 'add_transaction' %}">
        {% csrf_token %}
        <input type="hidden" name="form_type" value="extra">
        
        <div class="form-group">
            <label for="extra-date" class="form-label">Date</label>
            <input type="date" id="extra-date" name="date" value="{{ today }}" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="extra-desc" class="form-label">Description</label>
            <input type="text" id="extra-desc" name="description" placeholder="e.g. Laundry, Room cleaning, Guest lunch" class="form-control" required>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label for="extra-amount" class="form-label">Amount (₹)</label>
            <input type="number" step="0.01" id="extra-amount" name="amount" placeholder="0.00" class="form-control" required>
        </div>

        <div style="display: flex; gap: 12px;">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            <button type="submit" class="btn" style="flex: 1;">Save Extra</button>
        </div>
    </form>

    <!-- Log Payment Form -->
    <form id="form-payment" method="post" action="{% url 'add_transaction' %}" style="display: none;">
        {% csrf_token %}
        <input type="hidden" name="form_type" value="payment">
        
        <div class="form-group">
            <label for="payment-date" class="form-label">Date</label>
            <input type="date" id="payment-date" name="date" value="{{ today }}" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="payment-amount" class="form-label">Amount Paid (₹)</label>
            <input type="number" step="0.01" id="payment-amount" name="amount" placeholder="0.00" class="form-control" required>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label for="payment-method" class="form-label">Payment Method</label>
            <select id="payment-method" name="method" class="form-control">
                <option value="UPI">UPI (GPay / PhonePe / Paytm)</option>
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>
        </div>

        <div style="display: flex; gap: 12px;">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            <button type="submit" class="btn" style="flex: 1;">Save Payment</button>
        </div>
    </form>
</div>

<script>
    function switchTab(type) {
        const tabExtra = document.getElementById('tab-extra');
        const tabPayment = document.getElementById('tab-payment');
        const formExtra = document.getElementById('form-extra');
        const formPayment = document.getElementById('form-payment');

        if (type === 'extra') {
            tabExtra.classList.add('active');
            tabPayment.classList.remove('active');
            formExtra.style.display = 'block';
            formPayment.style.display = 'none';
        } else {
            tabPayment.classList.add('active');
            tabExtra.classList.remove('active');
            formPayment.style.display = 'block';
            formExtra.style.display = 'none';
        }
    }
</script>
{% endblock %}
